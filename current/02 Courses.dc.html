<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    body { margin: 0; background: #f3f4f6; }
  </style>
</helmet>
<div style="min-height:100vh;background:#f3f4f6;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif" data-screen-label="Courses (current)">

  <header style="position:sticky;top:0;z-index:40;background:transparent">
    <div style="max-width:1280px;margin:0 auto;padding:0 32px">
      <div style="display:flex;justify-content:space-between;align-items:center;height:64px">
        <div style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <img src="../public/3D_S-Logo-removebg.png" alt="S@Learn logo" style="height:40px;width:auto">
          <span style="font-size:20px;line-height:28px;font-weight:700;color:#1f2937">@Learn</span>
        </div>
        <nav style="display:flex;align-items:center;gap:32px">
          <span style="font-weight:500;color:#4b5563;cursor:pointer" style-hover="color:#1f2937">Home</span>
          <span style="font-weight:500;color:#d0a300;cursor:pointer">Courses</span>
        </nav>
        <div style="display:flex;align-items:center;gap:16px">
          <button style="display:flex;align-items:center;gap:8px;background:#d0a300;color:#ffffff;padding:8px 16px;border-radius:8px;border:none;font-size:16px;cursor:pointer" style-hover="background:#a67b00">
            <span style="display:inline-block;width:20px;height:20px;background:#ffffff;-webkit-mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M19%2021v-2a4%204%200%200%200-4-4H9a4%204%200%200%200-4%204v2%22%2F%3E%3Ccircle%20cx%3D%2212%22%20cy%3D%227%22%20r%3D%224%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat;mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M19%2021v-2a4%204%200%200%200-4-4H9a4%204%200%200%200-4%204v2%22%2F%3E%3Ccircle%20cx%3D%2212%22%20cy%3D%227%22%20r%3D%224%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat"></span>
            <span>Sign In</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div style="max-width:1280px;margin:0 auto;padding:32px">
    <div style="margin-bottom:32px">
      <h1 style="font-size:30px;line-height:36px;font-weight:700;color:#1f2937;margin:0 0 24px">Explore Courses</h1>
      <div style="display:flex;gap:16px;margin-bottom:24px">
        <div style="position:relative;flex:1">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);display:inline-block;width:20px;height:20px;background:#9ca3af;-webkit-mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Ccircle%20cx%3D%2211%22%20cy%3D%2211%22%20r%3D%228%22%2F%3E%3Cpath%20d%3D%22m21%2021-4.3-4.3%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat;mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Ccircle%20cx%3D%2211%22%20cy%3D%2211%22%20r%3D%228%22%2F%3E%3Cpath%20d%3D%22m21%2021-4.3-4.3%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat"></span>
          <input type="text" placeholder="Search courses..." style="width:100%;box-sizing:border-box;padding:8px 16px 8px 40px;border:1px solid #d1d5db;border-radius:8px;font-size:16px;outline:none" style-focus="box-shadow:0 0 0 2px #F4C300;border-color:transparent">
        </div>
        <select style="padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;font-size:16px;background:#ffffff;outline:none">
          <option>All Categories</option>
          <option>Web Development</option>
          <option>Marketing</option>
          <option>Data Science</option>
          <option>Design</option>
          <option>Business</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px">
      <sc-for list="{{ courses }}" as="c" hint-placeholder-count="6">
        <div style="background:#ffffff;border-radius:8px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -2px rgba(0,0,0,0.1);overflow:hidden;cursor:pointer;transition:box-shadow .15s" style-hover="box-shadow:0 10px 15px -3px rgba(0,0,0,0.1),0 4px 6px -4px rgba(0,0,0,0.1)">
          <div style="height:192px;background:linear-gradient(to bottom right,#ffca33,#d0a300);display:flex;align-items:center;justify-content:center">
            <span style="font-size:60px;color:#ffffff;opacity:0.5">📚</span>
          </div>
          <div style="padding:16px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:12px;background:#fff2cc;color:#d0a300;padding:4px 8px;border-radius:4px">{{ c.category }}</span>
              <span style="font-size:12px;background:#f3f4f6;color:#4b5563;padding:4px 8px;border-radius:4px">{{ c.level }}</span>
            </div>
            <h3 style="font-weight:700;font-size:18px;line-height:28px;color:#1f2937;margin:0 0 8px">{{ c.title }}</h3>
            <p style="color:#4b5563;font-size:14px;line-height:20px;margin:0 0 12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">{{ c.description }}</p>
            <div style="display:flex;align-items:center;font-size:14px;color:#6b7280;gap:16px;margin-bottom:12px">
              <div style="display:flex;align-items:center;gap:4px">
                <span style="display:inline-block;width:16px;height:16px;background:#6b7280;-webkit-mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Ccircle%20cx%3D%2212%22%20cy%3D%2212%22%20r%3D%2210%22%2F%3E%3Cpath%20d%3D%22M12%206v6l4%202%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat;mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Ccircle%20cx%3D%2212%22%20cy%3D%2212%22%20r%3D%2210%22%2F%3E%3Cpath%20d%3D%22M12%206v6l4%202%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat"></span>
                <span>{{ c.hours }}h</span>
              </div>
              <div style="display:flex;align-items:center;gap:4px">
                <span style="display:inline-block;width:16px;height:16px;background:#6b7280;-webkit-mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M16%2021v-2a4%204%200%200%200-4-4H6a4%204%200%200%200-4%204v2%22%2F%3E%3Ccircle%20cx%3D%229%22%20cy%3D%227%22%20r%3D%224%22%2F%3E%3Cpath%20d%3D%22M22%2021v-2a4%204%200%200%200-3-3.87%22%2F%3E%3Cpath%20d%3D%22M16%203.13a4%204%200%200%201%200%207.75%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat;mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M16%2021v-2a4%204%200%200%200-4-4H6a4%204%200%200%200-4%204v2%22%2F%3E%3Ccircle%20cx%3D%229%22%20cy%3D%227%22%20r%3D%224%22%2F%3E%3Cpath%20d%3D%22M22%2021v-2a4%204%200%200%200-3-3.87%22%2F%3E%3Cpath%20d%3D%22M16%203.13a4%204%200%200%201%200%207.75%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat"></span>
                <span>{{ c.students }}</span>
              </div>
              <div style="display:flex;align-items:center;gap:4px">
                <span style="display:inline-block;width:16px;height:16px;background:#facc15;-webkit-mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M11.525%202.295a.53.53%200%200%201%20.95%200l2.31%204.679a2.123%202.123%200%200%200%201.595%201.16l5.166.756a.53.53%200%200%201%20.294.904l-3.736%203.638a2.123%202.123%200%200%200-.611%201.878l.882%205.14a.53.53%200%200%201-.771.56l-4.618-2.428a2.122%202.122%200%200%200-1.973%200L6.396%2021.01a.53.53%200%200%201-.77-.56l.881-5.139a2.122%202.122%200%200%200-.611-1.879L2.16%209.795a.53.53%200%200%201%20.294-.906l5.165-.755a2.122%202.122%200%200%200%201.597-1.16z%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat;mask:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23000%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M11.525%202.295a.53.53%200%200%201%20.95%200l2.31%204.679a2.123%202.123%200%200%200%201.595%201.16l5.166.756a.53.53%200%200%201%20.294.904l-3.736%203.638a2.123%202.123%200%200%200-.611%201.878l.882%205.14a.53.53%200%200%201-.771.56l-4.618-2.428a2.122%202.122%200%200%200-1.973%200L6.396%2021.01a.53.53%200%200%201-.77-.56l.881-5.139a2.122%202.122%200%200%200-.611-1.879L2.16%209.795a.53.53%200%200%201%20.294-.906l5.165-.755a2.122%202.122%200%200%200%201.597-1.16z%22%2F%3E%3C%2Fsvg%3E') center/contain no-repeat"></span>
                <span>{{ c.rating }}</span>
              </div>
            </div>
            <p style="font-size:14px;color:#4b5563;margin:0">by {{ c.instructor }}</p>
            <p style="font-size:18px;font-weight:700;color:{{ c.priceColor }};margin:8px 0 0">{{ c.price }}</p>
          </div>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const courses = [
      { category: 'Web Development', level: 'beginner', title: 'Introduction to Web Development', description: 'Learn HTML, CSS and JavaScript from scratch and build your first responsive websites.', hours: 12, students: 248, rating: '4.6', instructor: 'Lucien Engolo', price: '$29.99', priceColor: '#d0a300' },
      { category: 'Marketing', level: 'beginner', title: 'Digital Marketing Fundamentals', description: 'Master social media, SEO and content strategies to grow any local business online.', hours: 8, students: 173, rating: '4.4', instructor: 'Marie Nguema', price: 'Free', priceColor: '#16a34a' },
      { category: 'Data Science', level: 'intermediate', title: 'Python for Data Analysis', description: 'Analyse real datasets with pandas, NumPy and matplotlib through hands-on projects.', hours: 15, students: 96, rating: '4.8', instructor: 'Samuel Tchoua', price: '$39.99', priceColor: '#d0a300' },

      { category: 'Web Development', level: 'advanced', title: 'Advanced JavaScript Patterns', description: 'Closures, async patterns, performance and architecture for production apps.', hours: 18, students: 64, rating: '4.7', instructor: 'Lucien Engolo', price: '$49.99', priceColor: '#d0a300' },
    ];
    return { courses };
  }
}
</script>
</body>
</html>
