<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/3D_S-Logo-removebg.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="S@Learn is a mobile-first online learning platform: browse free and paid courses, watch lessons, take quizzes, earn certificates, and get help from Kairos Mind, an in-lesson AI tutor."
    />
    <!-- The Longrich design system's fonts.css @imports these — preconnect
         cuts the DNS/TLS handshake off the render-blocking font waterfall. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- DESIGN.md's ink-and-paper system (Fraunces/IBM Plex Mono via Google
         Fonts, General Sans via Fontshare) -- used only by pages built
         against that system so far (the tutor marketplace); not yet applied
         app-wide, same incremental-porting approach as the `canvas` colors
         in tailwind.config.js. -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" />
    <title>S@Learn — Online Learning Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
